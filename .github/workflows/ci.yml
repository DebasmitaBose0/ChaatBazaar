name: CI Checks

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: HTMLHint
        run: npx htmlhint "**/*.html"

      - name: CSS Lint (Basic)
        run: npx stylelint "css/*.css" --config '{ "rules": { "color-no-invalid-hex": true } }'
